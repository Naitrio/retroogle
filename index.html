<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Search</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <link rel="stylesheet" href="Styles/Style.css">
</head>

<style>
        :root {

            --bg-color: #ffffff;
            --text-color: #000000;

            --link-color: #0000cc;

            --theme-menu-bg: #f0f0f0;
            --theme-menu-border: #808080;
            --theme-menu-shadow: #808080;
            --theme-hover-bg: #ccccff;

            --logo-blue: #1726b3;
            --logo-red: #d32121;
            --logo-yellow: #de9b00;
            --logo-green: #008a00;

            --toolbar-new-color: red;

            --search-bg: #ffffff;
            --search-text: #000000;

            --search-border-dark: #808080;
            --search-border-darker: #404040;
            --search-border-light: #dcdcdc;

            --search-shadow-dark: #404040;
            --search-shadow-light: #ffffff;

            --suggestions-bg: #ffffff;
            --suggestions-border: #7f7f7f;
            --suggestions-shadow: #808080;

            --button-bg: #f0f0f0;
            --button-hover-bg: #dcdcdc;
            --button-text: #000000;

            --button-border-light: #ffffff;
            --button-border-dark: #808080;

            --footer-text: #555555;
        }

        .dark-theme {

            --bg-color: #22242a;
            --text-color: #e0e0e0;

            --link-color: #7aa2ff;

            --theme-menu-bg: #2f3138;
            --theme-menu-border: #555555;
            --theme-menu-shadow: #000000;
            --theme-hover-bg: #404560;

            --logo-blue: #598dda;
            --logo-red: #d46767;
            --logo-yellow: #d4b15e;
            --logo-green: #5ace6f;


            --toolbar-new-color: #ff8080;

            --search-bg: #2b2d33;
            --search-text: #e0e0e0;

            --search-border-dark: #555555;
            --search-border-darker: #111111;
            --search-border-light: #666666;

            --search-shadow-dark: #111111;
            --search-shadow-light: #444444;

            --suggestions-bg: #2f3138;
            --suggestions-border: #555555;
            --suggestions-shadow: #000000;

            --button-bg: #3a3d45;
            --button-hover-bg: #4b4e57;
            --button-text: #e0e0e0;

            --button-border-light: #666666;
            --button-border-dark: #111111;

            --footer-text: #a0a0a0;
        }

        @font-face {
            font-family: "Catull";
            src: url("Fonts/Catull.ttf");
        }

        @font-face {
            font-family: "Tahoma";
            src: url("Fonts/Tahoma.woff");
        }

        @font-face {
            font-family: "Arial";
            src: url("Fonts/Arial.woff");
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body {
            min-height: 100vh;
        }

        .header {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0 0 0 0;
            padding: 0 0 20px 0;
        }

        .mainPage {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 140px 0 0 0;
            padding: 0 0 0 0;
        }

        /* Top Navigation Links */
        .top-nav {
            font-size: 13px;
            text-align: right;
            margin-right: 15px;
            margin-bottom: 20px;
        }

            .top-nav a {
                color: var(--link-color);
                text-decoration: underline;
                margin-left: 10px;
            }

        /* Theme Menu */
        .theme-menu {
            font-family: Tahoma, sans-serif;
            display: none;
            position: absolute;
            right: 69px;
            top: 20px;
            width: 140px;
            background: var(--theme-menu-bg);
            border: 1px solid var(--theme-menu-border);
            box-shadow: 2px 2px 0px var(--theme-menu-shadow);
            text-align: left;
            z-index: 1000;
        }

        .theme-item {
            padding: 4px 8px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-color);
        }

        .theme-item:hover {
            background: var(--theme-hover-bg);
        }

        /* Google Logo Styling */
        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo {
            font-size: 90px;
            font-family: "Catull", "Garamond", "EB Garamond", "Georgia", "Times New Roman", Times, serif;
            letter-spacing: -1px;
            text-shadow: 3px 3px 3px rgba(0,0,0,0.25);
        }

        .g-blue {
            color: var(--logo-blue);
        }

        .g-red {
            color: var(--logo-red);
        }

        .g-yellow {
            color: var(--logo-yellow);
        }

        .g-green {
            color: var(--logo-green);
        }

        /* Outer container table */
        .main-table {
            padding: 5px;
            width: 100%;
            max-width: 1px;
            margin: 0 auto;
        }

        .toolbar {
            width: 100%;
            max-width: 700px;
            margin: 40px auto 0 auto;
            font-size: 13px;
            text-align: center;
        }

            .toolbar a {
                color: var(--link-color);
                text-decoration: underline;
            }

            .toolbar sup {
                color: var(--toolbar-new-color);
            }

        .search-cell {
            text-align: center;
            font-size: 14px;
            position: relative;
        }

        /* Plain text input */
        .search-input {
            width: 490px;
            font-size: 15px;
            padding: 4px;
            margin: 4px 0px 4px 0;
            color: var(--search-text);
            border: 1px solid var(--search-border-darker);
            border-top: 1px solid var(--search-border-dark);
            border-left: 1px solid var(--search-border-dark);
            border-right: 1px solid var(--search-border-light);
            border-bottom: 1px solid var(--search-border-light);
            background: var(--search-bg);
            box-shadow:
                inset 1px 1px 0 var(--search-shadow-dark),
                inset -1px -1px 0 var(--search-shadow-light);
        }

            .search-input:focus {
                outline: none;
            }

        /* Suggestion dropdown */
        .suggestions {
            display: none;
            position: absolute;
            box-shadow: 2px 2px 0px var(--suggestions-shadow);
            width: 500px;
            margin: 0 auto;
            border: 1px solid var(--suggestions-border);
            border-top: none;
            background: var(--suggestions-bg);
            color: var(--text-color);
            text-align: left;
            box-sizing: border-box;
            font-family: Tahoma, sans-serif;
            font-size: 15px;
        }

        .suggestion-item {
            padding: 2px 4px;
            line-height: 18px;
        }

            .suggestion-item.active,
            .suggestion-item:hover {
                background-color: var(--theme-hover-bg);
            }

        /* Beveled buttons */
        .btn {
            -webkit-appearance: none;
            appearance: none;
            color: var(--button-text);
            font-size: 13.5px;
            font-family: Tahoma, sans-serif;
            padding: 3px 7px;
            margin: 4px;
            background-color: var(--button-bg);
            border: 2px solid;
            border-color:
                var(--button-border-light)
                var(--button-border-dark)
                var(--button-border-dark)
                var(--button-border-light);
            cursor: pointer;
        }

            .btn:hover {
                background-color: var(--button-hover-bg);
            }

            .btn:active {
                border-color:
                    var(--button-border-dark)
                    var(--button-border-light)
                    var(--button-border-light)
                    var(--button-border-dark);
            }

        /* Footer layout */
        .footer-table {
            width: 100%;
            max-width: 700px;
            margin: 40px auto 0 auto;
            font-size: 12px;
            text-align: center;
        }

            .footer-table a {
                color: var(--link-color);
                text-decoration: underline;
            }

        .footer-text {
            color: var(--footer-text);
        }

        @media (max-width: 600px) {

            .mainPage {
                margin-top: 80px;
            }

            .logo {
                font-size: 80px;
            }

            .toolbar {
                font-size: 12.5px;
            }

            .search-input {
                width: 90vw;
                max-width: 390px;
                box-sizing: border-box;
            }

            .suggestions {
                width: 90vw;
                max-width: 390px;
            }

            .main-table {
                width: 100%;
                padding: 0;
            }

            .top-nav {
                text-align: right;
                margin-bottom: 30px;
            }

            .btn {
                margin-top: 8px;
            }
        }

</style>

<body>

    <div class="header">
        <!-- Top Navigation -->
        <div class="top-nav">
            <a href="#" id="themeButton">Themes</a>
            <a href="https://support.google.com/">Help</a>
            <a href="https://github.com/Naitrio/retroogle">About Retroogle</a>
        </div>
    </div>

    <div id="themeMenu" class="theme-menu">

    <div class="theme-item" data-theme="light">
        Light
    </div>

    <div class="theme-item" data-theme="dark">
        Dark
    </div>

</div>

    <div class="mainPage">



        <!-- Google Logo -->
        <div class="logo-container">
            <span class="logo">
                <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
            </span>
        </div>

        <!-- Hyperlink Toolbar -->
        <div class="toolbar">

            <a href="https://www.google.com/">Web</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://images.google.com/">Images</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://www.YouTube.com">Video</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://www.gmail.com">Gmail</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://www.google.com/shopping?udm=28">Froogle</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://maps.google.com">Maps</a>
            <span>&nbsp;&nbsp;</span>
            <a href="https://gemini.google.com">Gemini</a><sup>New!</sup>


        </div>

        <!-- Core Search Interface Form -->
        <form action="https://www.google.com/search" method="GET" autocomplete="off">
            <table class="main-table">
                <tr>
                    <td class="search-cell">

                        <input type="text"
                               id="q"
                               name="q"
                               class="search-input"
                               autofocus
                               required
                               autocomplete="off">

                        <!-- Suggestions -->
                        <div id="suggestions" class="suggestions"></div>

                        <br>

                        <input type="submit" value="Google Search" class="btn">

                        <!-- I'm Feeling Lucky -->
                        <input type="submit" name="btnI" value="I'm Feeling Lucky" class="btn">
                    </td>
                </tr>
            </table>
        </form>

        <!-- Footer Links -->
        <table class="footer-table">
            <tr>
                <td>
                    <a href="https://business.google.com/us/google-ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Advertising Programs</a>
                    <span> - </span>
                    <a href="https://business.google.com/us/business-profile/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Business Solutions</a>
                    <span> - </span>
                    <a href="https://www.google.com/search/howsearchworks/?fg=1">About Search</a>
                </td>
            </tr>

            <tr>
                <td style="padding-top: 15px; color: #555555;">
                    Copyright ©2026 Google Inc. - Searching 401,307,998,701 web pages
                </td>
            </tr>
        </table>
    </div>
    <script src="Scripts/Script.js"></script>
</body>
</html>
